---
name: CI/CD - Build and Publish Images

permissions:
  contents: read
  packages: write

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-publish:
    name: Build (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: api
            dockerfile: api/Dockerfile
          - component: web-ui
            context: web-ui
            dockerfile: web-ui/Dockerfile
          - component: trade-writer
            context: db/redis-postgres-syncers
            dockerfile: db/redis-postgres-syncers/Containerfile
            build_args: BIN_NAME=trade-writer
          - component: db-syncer
            context: db/redis-postgres-syncers
            dockerfile: db/redis-postgres-syncers/Containerfile
            build_args: BIN_NAME=db-syncer
          - component: price-cacher
            context: db/redis-postgres-syncers
            dockerfile: db/redis-postgres-syncers/Containerfile
            build_args: BIN_NAME=price-cacher
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Set lowercased owner
        id: vars
        run: echo "OWNER_LOWER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT
      - name: Log in to registry
        if: github.event_name != 'pull_request' && github.repository == 'SM26-Industrial-Software-Dev/equity-trading-system'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          build-args: ${{ matrix.build_args }}
          push: ${{ github.event_name != 'pull_request' && github.repository == 'SM26-Industrial-Software-Dev/equity-trading-system' }}
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.OWNER_LOWER }}/${{ matrix.component }}:latest
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

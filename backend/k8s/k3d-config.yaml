---
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: dev-cluster

# IaC Networking: Force K3d to join Compose's network
network: k3d-network

# IaC Networking: Write the internal Docker DNS name and port into the kubeconfig
kubeAPI:
  host: "k3d-dev-cluster-serverlb"
  hostPort: "6443"

servers: 1
agents: 2
image: rancher/k3s:v1.28.2-k3s1
ports:
  - port: 8080:80 # Maps localhost:8080 to the cluster's incoming web traffic
    nodeFilters:
      - loadbalancer
options:
  k3d:
    wait: true # Ensures the command doesn't finish until the cluster is fully ready
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
volumes:
  - volume: ${HOST_ROOT}/backend/Locust:/mnt/locust:z
    nodeFilters:
      - "all"
files:
  - description: "Bootstrap Flux Controllers only — targets are applied by cluster_up.sh"
    source: ./flux-system/gotk-components.yaml
    destination: /var/lib/rancher/k3s/server/manifests/01-gotk-components.yaml
    nodeFilters:
      - "server:*"

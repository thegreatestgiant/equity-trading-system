---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: dev-repo
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/thegreatestgiant/equity-trading-system.git # (Your Fork URL)
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dev-stack
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: dev-repo
  path: ./backend/k8s/manifests/overlays/dev-sean # Points to your overlay!
  prune: true

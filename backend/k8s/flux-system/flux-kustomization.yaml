---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dev-stack
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: dev-repo
  # This points directly to the kustomization.yaml we made earlier!
  path: ./backend/k8s/manifests/overlays/dev-sean
  prune: true

---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: trading-pooler
spec:
  cluster:
    name: trading-db
  instances: 2
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "2000"
      default_pool_size: "60"
  template:
    spec:
      containers: []
      initContainers:
        - name: wait-for-primary
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL Primary to become reachable before starting PgBouncer pooler..."
              until nc -z trading-db-rw.data.svc.cluster.local 5432; do
                echo "Postgres not ready. Sleeping 5 seconds..."
                sleep 5
              done
              echo "Postgres is online! Proceeding with PgBouncer startup."

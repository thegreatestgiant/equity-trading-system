---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-syncer
  namespace: data
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secret-syncer-role
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secret-syncer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secret-syncer-role
subjects:
  - kind: ServiceAccount
    name: secret-syncer
    namespace: data
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sync-db-credentials
  namespace: data
spec:
  ttlSecondsAfterFinished: 15
  template:
    spec:
      serviceAccountName: secret-syncer
      containers:
        - name: syncer
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for trading-db-app secret to be generated by CNPG..."
              until kubectl get secret trading-db-app -n data >/dev/null 2>&1; do sleep 2; done
              echo "Secret found! Extracting credentials..."
              USER=$(kubectl get secret trading-db-app -n data -o jsonpath='{.data.username}' | base64 -d)
              PASS=$(kubectl get secret trading-db-app -n data -o jsonpath='{.data.password}' | base64 -d)
              echo "Syncing to data and backend namespaces as db-credentials..."
              for ns in data backend; do
                kubectl create secret generic db-credentials -n $ns \
                  --from-literal=POSTGRES_USER="$USER" \
                  --from-literal=POSTGRES_PASSWORD="$PASS" \
                  --from-literal=username="$USER" \
                  --from-literal=password="$PASS" \
                  --dry-run=client -o yaml | kubectl apply -f -
              done
              echo "Done!"
      restartPolicy: OnFailure

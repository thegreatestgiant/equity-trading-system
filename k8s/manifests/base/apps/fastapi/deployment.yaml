---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-api
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: redis:8-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for PgBouncer/Postgres and Redis market_prices..."
              until nc -z trading-pooler.data.svc.cluster.local 5432 && \
                    [ "$(redis-cli -h redis-proxy.data.svc.cluster.local HLEN market_prices 2>/dev/null)" -gt "0" ] 2>/dev/null; do
                echo "Dependencies not ready. Sleeping 5 seconds..."
                sleep 5
              done
              echo "Dependencies ready! Proceeding with FastAPI startup."
      containers:
        - name: fastapi
          image: api-image
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /probe
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /probe
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: db-credentials
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: ENVIRONMENT
              value: "Production"

            - name: REDIS_MAX_PODS
              value: "20"
            - name: REDIS_SERVER_MAX_CLIENTS
              value: "10000"
            - name: ROLLOUT_SURGE_PCT
              value: "25"

            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: redis-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: redis-config
                  key: REDIS_PORT
            - name: TRADE_STREAM
              valueFrom:
                configMapKeyRef:
                  name: redis-config
                  key: REDIS_STREAM_NAME

            # Explicit mapping to the new PG_ROUTING variables
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: db-routing
                  key: PG_ROUTING_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: db-routing
                  key: PG_ROUTING_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: db-routing
                  key: PG_DATABASE
            - name: POSTGRES_RO_HOST
              valueFrom:
                configMapKeyRef:
                  name: db-routing
                  key: PG_RO_HOST
            - name: POSTGRES_RO_PORT
              valueFrom:
                configMapKeyRef:
                  name: db-routing
                  key: PG_RO_PORT
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

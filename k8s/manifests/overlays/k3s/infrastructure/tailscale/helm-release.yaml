---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: tailscale-operator
      version: "1.70.0"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
  install:
    createNamespace: true
  targetNamespace: tailscale
  values:
    oauth:
      existingSecret: operator-oauth

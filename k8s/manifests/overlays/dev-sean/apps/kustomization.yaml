---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/apps

patches:
  - target:
      kind: Deployment
      name: fastapi-api
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fastapi-api
      spec:
        template:
          spec:
            containers:
              - name: fastapi
                env:
                  - name: ENVIRONMENT
                    value: "dev-sean"
  - target:
      kind: Deployment
      name: streamlit
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: streamlit
      spec:
        template:
          spec:
            containers:
              - name: streamlit
                image: web-ui-image:dev-sean
                imagePullPolicy: IfNotPresent

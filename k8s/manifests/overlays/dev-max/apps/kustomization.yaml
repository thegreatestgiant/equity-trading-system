---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/apps

images:
   - name: ghcr.io/sm26-industrial-software-dev/api
     newName: ghcr.io/maxrabz/fastapi
     newTag: latest
  # - name: ghcr.io/sm26-industrial-software-dev/web-ui
  #   newName: ghcr.io/williamtrump/equity-trading-frontend
  # - name: ghcr.io/sm26-industrial-software-dev/db-syncer
  #   newName: ghcr.io/yscohen/db-syncer
  # - name: ghcr.io/sm26-industrial-software-dev/trade-writer
  #   newName: ghcr.io/yscohen/trade-writer

patches:
  - path: fastapi-deployment-patch.yaml # This is what you named your file
  - target:
      kind: Deployment
      name: fastapi-api
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fastapi-api
      spec:
        template:
          spec:
            containers:
              - name: fastapi
                env:
                  - name: ENVIRONMENT
                    value: "dev-max"
  # - target:
  #     kind: ScaledObject
  #     name: fastapi-scaler
  #     namespace: backend
  #   patch: |-
  #     - op: replace
  #       # Targets the 3rd trigger (index 2: cpu=0, memory=1, prometheus=2)
  #       path: /spec/triggers/2/metadata/threshold
  #       value: "30"
  #     - op: replace
  #       path: /spec/advanced/horizontalPodAutoscalerConfig/behavior/scaleDown/stabilizationWindowSeconds
  #       # Reduced seconds for faster local testing
  #       value: 300
  #     - op: add
  #       path: /spec/maxReplicaCount
  #       value: 40
  #     - op: add
  #       path: /spec/minReplicaCount
  #       value: 10
  - target:
      kind: ScaledObject
      name: fastapi-scaler
      namespace: backend
    patch: |-
      - op: replace
        path: /spec/triggers
        value:
          # =====================================================================
          # MAX: Use Concurrency (Little's Law) instead of RPS for scaling!
          # =====================================================================
          # Why? If we scale on RPS (http_requests_total), we risk an autoscaling
          # death spiral. When the DB gets slow, latency spikes, so total RPS drops.
          # If RPS drops, HPA scales down, making the bottleneck worse!
          
          # Instead, we scale on active, in-flight requests (Concurrency).
          # Concurrency = RPS * Latency (Little's Law). 
          # If the DB gets slow, requests pile up inside the pod, so concurrency
          # skyrockets. This forces HPA to safely scale UP to rescue the system!
          # =====================================================================
          - type: prometheus
            metadata:
              serverAddress: http://loki-stack-prometheus-server.monitoring.svc.cluster.local
              metricName: fastapi_concurrency
              # Target 15 active requests in-flight per pod before scaling up
              threshold: "15"
              query: |
                sum(rate(http_request_duration_seconds_sum[1m]))
      - op: replace
        path: /spec/advanced/horizontalPodAutoscalerConfig/behavior/scaleDown/stabilizationWindowSeconds
        # Reduced seconds for faster local testing
        value: 300
      - op: add
        path: /spec/maxReplicaCount
        value: 20
      - op: add
        path: /spec/minReplicaCount
        value: 10
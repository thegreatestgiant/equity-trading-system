---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/apps

images:
  - name: ghcr.io/sm26-industrial-software-dev/db-syncer
    newTag: dev
  - name: ghcr.io/sm26-industrial-software-dev/trade-writer
    newTag: dev
  - name: ghcr.io/sm26-industrial-software-dev/price-cacher
    newTag: dev
  - name: ghcr.io/sm26-industrial-software-dev/price-timeseries-cacher
    newTag: dev

patches:
  - target:
      kind: Deployment
      name: fastapi-api
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fastapi-api
      spec:
        template:
          spec:
            containers:
              - name: fastapi
                env:
                  - name: ENVIRONMENT
                    value: "dev-yehuda"
